<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lindner Research Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0F1E;
      --surface: #111827;
      --elevated: #1F2937;
      --navy: #003366;
      --red: #E00122;
      --text: #F9FAFB;
      --muted: #9CA3AF;
      --border: #374151;
      --success: #10B981;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        linear-gradient(rgba(224,1,34,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(224,1,34,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 2rem;
    }
    .logo-block {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo-shield {
      width: 48px;
      height: 48px;
      background: var(--red);
      clip-path: polygon(50% 0%, 100% 18%, 100% 66%, 50% 100%, 0% 66%, 0% 18%);
      margin: 0 auto 1rem;
    }
    .logo-block h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }
    .logo-block p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      border-top: 2px solid var(--red);
    }
    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    input[type="password"] {
      width: 100%;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: var(--red); }
    .error-msg {
      background: rgba(224,1,34,0.1);
      border: 1px solid rgba(224,1,34,0.3);
      border-radius: 4px;
      color: #fca5a5;
      font-size: 0.8rem;
      padding: 0.6rem 0.875rem;
      margin-bottom: 1rem;
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 1.25rem;
      background: var(--red);
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 0.8rem;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }
    button[type="submit"]:hover { opacity: 0.9; }
    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-block">
      <div class="logo-shield"></div>
      <h1>Lindner Research</h1>
      <p>University of Cincinnati · Equity Research Platform</p>
    </div>
    <div class="card">
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <label for="password">Access Password</label>
        <input type="password" id="password" name="password" autofocus placeholder="••••••••••••">
        <button type="submit">Enter Platform →</button>
      </form>
    </div>
    <div class="footer">University of Cincinnati · Lindner College of Business</div>
  </div>
</body>
</html>
